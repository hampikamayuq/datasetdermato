name: Dataset validation

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python validator
        run: python scripts/dataset_validate.py

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Import app modules
        run: python -c "import sys; sys.path.insert(0, 'scripts'); import dataset_validate; import dataset_ops; import ui_register; print('imports ok')"

      - name: Test POSIX validation helper
        if: runner.os != 'Windows'
        run: sh scripts/validate_all.sh

      - name: Test Windows validation helper
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/validate_all.ps1
